<!DOCTYPE html>
<html>
    <head>
        <title>globOS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="top" style="display: flex; justify-content: space-between; background-color: rgba(0, 0, 0, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(20px); position: absolute; top: 0; left: 0; right: 0; pointer-events: none;">
            <p style="margin-left: 20px; font-weight: bold; color: white;">globOS</p>
            <p id="time-element" style="margin-right: 20px; color: white;">7/16/2026, 8:11:19 PM</p>
        </div>

        <div id="desktopApps" style="padding-left: 16px; padding-top: 64px;">
            <div class="app" id="notesopen">
                <img src="app-icons/notes.png" alt="Notes" class="app-icon">
                <p>Notes</p>
            </div>
        </div>

        <div class="window" id="welcome-message">
            <div class="windowheader" id="welcome-messageheader">
                <div class="closebutton" id="welcome-messageclose"></div>
                <p style="color: white;">Welcome</p>
                <p style="margin-right: 20px; color: white; font-weight: bold;">Window</p>
            </div>
            <div class="windowcontent" id="windowcontent">
                <div style="display: flex;">
                    <h1 style="padding-right: 30px; align-self: flex-end;">Welcome to globOS!</h1>
                    <img src="cat.png" alt="cat" id="cat-image">
                </div>
                <p>globOS is a <dfn>feature-limited OS</dfn> (because I'm a single person and don't have a lot of time to spend on it) but it has plenty of cool stuff you can use straight from your browser!</p>
            </div>
        </div>

        <div class="window" id="notes" style="display: none;">
            <div class="windowheader" id="notesheader">
                <div class="closebutton" id="notesclose"></div>
                <p style="color: white;">Notes</p>
                <p style="margin-right: 20px; color: white; font-weight: bold;">Window</p>
            </div>
            <div class="windowcontent" style="padding: 4px;">
                <textarea placeholder="Write your notes here..."></textarea>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
